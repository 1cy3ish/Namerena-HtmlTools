<script type="text/javascript">
    let menu_items = document.getElementsByTagName("li")

    function DefaultMode() {
        let menu_buttons = document.getElementsByTagName("a")
        menu_buttons[2].click()
    }

    for (let i = 0; i < menu_items.length; i++) {
        menu_items[i].onclick = function () {
            menu_items[i].style.backgroundColor = "#eee"
            for (let j = 0; j < menu_items.length; j++) {
                if (j != i) menu_items[j].style.backgroundColor = "rgba(0, 0, 0, 0)"
            }
        }
    }

    function ChangeOption() {
        index = document.getElementById("SCoption").selectedIndex
        //items = document.getElementsByTagName("input")
        items = new Array(4)
        items[0] = document.getElementById("lim1")
        items[1] = document.getElementById("lim2")
        items[2] = document.getElementById("lim3")
        items[3] = document.getElementById("lim4")
        items[4] = document.getElementById("lim5")

        switch (index) {
            case 0:
                items[0].setAttribute("placeholder", "XP")
                items[1].setAttribute("placeholder", "XD")
                items[2].setAttribute("placeholder", "不使用")
                items[3].setAttribute("placeholder", "不使用")
                items[4].setAttribute("placeholder", "不使用")

                items[0].style.display = 'inline'
                items[2].style.display = 'none'
                items[3].style.display = 'none'
                items[4].style.display = 'none'
                break;
            case 1:
                items[0].setAttribute("placeholder", "SCP")
                items[1].setAttribute("placeholder", "SFP")
                items[2].setAttribute("placeholder", "SWC")
                items[3].setAttribute("placeholder", "SDT")
                items[4].setAttribute("placeholder", "不使用")

                items[0].style.display = 'inline'
                items[2].style.display = 'inline'
                items[3].style.display = 'inline'
                items[4].style.display = 'none'
                break;
            case 2:
                items[0].setAttribute("placeholder", "主力评分不使用")
                items[1].setAttribute("placeholder", "SFSPJ")
                items[2].setAttribute("placeholder", "不使用")
                items[3].setAttribute("placeholder", "SHSPJ")
                items[4].setAttribute("placeholder", "不使用")

                items[0].style.display = 'none'
                items[2].style.display = 'none'
                items[3].style.display = 'inline'
                items[4].style.display = 'none'
                break;
            case 3:
                items[0].setAttribute("placeholder", "SQP")
                items[1].setAttribute("placeholder", "SQD")
                items[2].setAttribute("placeholder", "SPP")
                items[3].setAttribute("placeholder", "SCQD")
                items[4].setAttribute("placeholder", "不使用")

                items[0].style.display = 'inline'
                items[2].style.display = 'inline'
                items[3].style.display = 'inline'
                items[4].style.display = 'none'
                break;
            case 4:
                items[0].setAttribute("placeholder", "SCP")
                items[1].setAttribute("placeholder", "SFP")
                items[2].setAttribute("placeholder", "SWC")
                items[3].setAttribute("placeholder", "SRH")
                items[4].setAttribute("placeholder", "SPJ")

                items[0].style.display = 'inline'
                items[2].style.display = 'inline'
                items[3].style.display = 'inline'
                items[4].style.display = 'inline'
                break;
            default:
                break;
        }
    }

    function uploadFile(textareaId) {
        var input = document.createElement('input');
        input.type = 'file';
        input.accept = '.txt';
        input.onchange = function (e) {
            var file = e.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function (ev) {
                document.getElementById(textareaId).value = ev.target.result;
            };
            reader.readAsText(file);
        };
        input.click();
    }

    function downloadFile(textareaId, filename) {
        var content = document.getElementById(textareaId).value;
        if (!content) { alert('输出为空，请先运行工具生成结果'); return; }
        var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
    }
</script>
